<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — AirLine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { background: linear-gradient(135deg, var(--airline-primary) 0%, #1a3a60 100%); min-height: 100vh; }
        .auth-card { border: none; border-radius: 18px; box-shadow: 0 16px 48px rgba(0,0,0,0.3); }
        .step-badge { background: var(--airline-sky); color: #fff; border-radius: 50%; width: 28px; height: 28px;
                      display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="text-center mb-4">
                <div style="font-size:2rem;font-weight:800;color:#fff">✈ Air<span style="color:var(--airline-accent)">Line</span></div>
            </div>
            <div class="card auth-card">
                <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold mb-1">Регистрация</h4>
                    <p class="text-muted mb-4 small">UC-002 · Создание учётной записи</p>

                    <div id="reg-alert"></div>

                    <!-- Step 1: Account -->
                    <div class="d-flex align-items-center mb-3">
                        <span class="step-badge me-2">1</span>
                        <span class="fw-semibold">Данные аккаунта</span>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Имя пользователя *</label>
                            <input type="text" class="form-control" id="username" placeholder="ivan_petrov">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" placeholder="user@example.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Пароль *</label>
                            <input type="password" class="form-control" id="password" placeholder="Мин. 8 символов">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Подтверждение пароля *</label>
                            <input type="password" class="form-control" id="password_confirm" placeholder="Повторите пароль">
                        </div>
                    </div>

                    <!-- Step 2: Passenger -->
                    <div class="d-flex align-items-center mb-3">
                        <span class="step-badge me-2">2</span>
                        <span class="fw-semibold">Данные пассажира</span>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Имя *</label>
                            <input type="text" class="form-control" id="first_name" placeholder="Иван">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Фамилия *</label>
                            <input type="text" class="form-control" id="last_name" placeholder="Петров">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Номер паспорта *</label>
                            <input type="text" class="form-control" id="passport_number" placeholder="RU1234567">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Гражданство *</label>
                            <input type="text" class="form-control" id="nationality" placeholder="Russian">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Дата рождения *</label>
                            <input type="date" class="form-control" id="birth_date">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Телефон</label>
                            <input type="text" class="form-control" id="phone" placeholder="+7 900 000 00 00">
                        </div>
                    </div>

                    <button class="btn btn-airline w-100 py-2 mb-3" onclick="doRegister()" id="reg-btn">
                        <i class="bi bi-person-check me-1"></i>Зарегистрироваться
                    </button>
                    <div class="text-center text-muted small">
                        Уже есть аккаунт? <a href="login.html">Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    async function doRegister() {
        const btn = document.getElementById('reg-btn');
        const fields = ['username','email','password','password_confirm',
                        'first_name','last_name','passport_number','nationality','birth_date'];

        // Basic client-side validation
        for (const f of fields) {
            if (!document.getElementById(f).value.trim()) {
                showAlert('reg-alert', `Поле "${document.querySelector(`label[for="${f}"], #${f}`)" обязательно для заполнения.`, 'warning');
                document.getElementById(f).focus();
                return;
            }
        }

        const data = {
            username:         document.getElementById('username').value.trim(),
            email:            document.getElementById('email').value.trim(),
            password:         document.getElementById('password').value,
            password_confirm: document.getElementById('password_confirm').value,
            first_name:       document.getElementById('first_name').value.trim(),
            last_name:        document.getElementById('last_name').value.trim(),
            passport_number:  document.getElementById('passport_number').value.trim(),
            nationality:      document.getElementById('nationality').value.trim(),
            birth_date:       document.getElementById('birth_date').value,
            phone:            document.getElementById('phone').value.trim(),
        };

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Регистрация...';

        try {
            const res = await api.auth.register(data);
            Auth.setTokens(res.tokens.access, res.tokens.refresh);
            Auth.setUser(res.user);
            showAlert('reg-alert', 'Регистрация успешна! Переходим...', 'success');
            setTimeout(() => window.location.href = 'index.html', 1000);
        } catch (e) {
            showErrors('reg-alert', e);
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-person-check me-1"></i>Зарегистрироваться';
        }
    }
</script>
</body>
</html>
