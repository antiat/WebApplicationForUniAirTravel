<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AirLine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { background: linear-gradient(135deg, var(--airline-primary) 0%, #1a3a60 100%); min-height: 100vh; display:flex; flex-direction:column; }
        .auth-card { border: none; border-radius: 18px; box-shadow: 0 16px 48px rgba(0,0,0,0.3); }
        .auth-logo { font-size: 2rem; font-weight: 800; color: var(--airline-primary); }
        .auth-logo span { color: var(--airline-accent); }
    </style>
</head>
<body class="align-items-center justify-content-center">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <div class="auth-logo">✈ Air<span>Line</span></div>
                <p class="text-white-50 mt-1">Авиаперевозки</p>
            </div>
            <div class="card auth-card">
                <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold mb-1">Вход в систему</h4>
                    <p class="text-muted mb-4 small">UC-002 · Авторизация пользователя</p>

                    <div id="login-alert"></div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="user@example.com" autocomplete="email">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="Введите пароль" autocomplete="current-password">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-airline w-100 py-2 mb-3" onclick="doLogin()" id="login-btn">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Войти
                    </button>
                    <div class="text-center text-muted small">
                        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
                    </div>
                    <hr class="my-3">
                    <div class="text-center">
                        <small class="text-muted d-block mb-1"><strong>Тестовые данные:</strong></small>
                        <small class="text-muted">admin@airline.com / admin123</small><br>
                        <small class="text-muted">ivan.petrov@example.com / password123</small>
                    </div>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="index.html" class="text-white-50 small"><i class="bi bi-arrow-left me-1"></i>На главную</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
    // Already logged in → redirect
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');

        if (!email || !password) {
            showAlert('login-alert', 'Введите email и пароль.', 'warning');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Вход...';

        try {
            const data = await api.auth.login(email, password);
            Auth.setTokens(data.access, data.refresh);
            Auth.setUser(data.user);

            // Redirect based on role
            const role = data.user?.role;
            if (role === 'admin' || role === 'manager') {
                window.location.href = 'admin-dashboard.html';
            } else {
                const next = new URLSearchParams(window.location.search).get('next') || 'index.html';
                window.location.href = next;
            }
        } catch (e) {
            showErrors('login-alert', e);
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Войти';
        }
    }

    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
